name: PR Telegram Notify

"on":
  pull_request:
    types: [opened, ready_for_review, closed]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Notify Telegram
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_STATE: ${{ github.event.pull_request.state }}
          PR_MERGED: ${{ github.event.pull_request.merged }}
        run: |
          KEYBOARD=$(jq -n -c '{
            keyboard: [
              [{"text": "📊 Статус процесса"}, {"text": "📂 Активные PR"}],
              [{"text": "❓ Помощь"}]
            ],
            resize_keyboard: true,
            is_persistent: true
          }')

          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg chat "$TG_CHAT_ID" \
              --arg title "$PR_TITLE" \
              --arg state "$PR_STATE" \
              --arg merged "$PR_MERGED" \
              --arg url "$PR_URL" \
              --argjson markup "$KEYBOARD" \
              '{
                chat_id: $chat,
                text: "🤖 <b>Jules обновление</b>\n\n<b>PR:</b> \($title | gsub("<"; "&lt;") | gsub(">"; "&gt;") | gsub("&"; "&amp;"))\n<b>Статус:</b> \($state)\n<b>Merged:</b> \($merged)\n\n<a href=\"\($url)\">Ссылка на PR</a>",
                parse_mode: "HTML",
                reply_markup: $markup
              }')"
