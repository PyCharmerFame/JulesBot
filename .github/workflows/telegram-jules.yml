name: Telegram to GitHub Issues

"on":
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  issues: write
  actions: write

jobs:
  telegram-to-issue:
    runs-on: ubuntu-latest

    steps:
      - name: Read Telegram and create issue
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          LAST_TG_UPDATE_ID: ${{ vars.LAST_TG_UPDATE_ID }}
          GH_TOKEN: ${{ github.token }}
        run: |
          OFFSET=$((LAST_TG_UPDATE_ID + 1))
          curl -s "https://api.telegram.org/bot${TG_BOT_TOKEN}/getUpdates?offset=${OFFSET}" > updates.json

          LATEST_ID=$(jq '[.result[].update_id] | max // empty' updates.json)

          TASK=$(jq -r --arg chat "$TG_CHAT_ID" '
            .result[]
            | select(.message.chat.id|tostring == $chat)
            | select(.message.text | startswith("/task "))
            | .message.text
          ' updates.json | tail -n 1 | sed 's#^/task ##')

          if [ -n "$TASK" ]; then
            gh issue create \
              --title "Telegram task" \
              --body "$TASK"

            curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TG_CHAT_ID}" \
              -d text="✅ Задача добавлена в GitHub Issues. Теперь открой Jules и попроси взять последнюю issue."
          fi

          if [ -n "$LATEST_ID" ]; then
            gh api \
              --method PATCH \
              repos/${{ github.repository }}/actions/variables/LAST_TG_UPDATE_ID \
              -f name=LAST_TG_UPDATE_ID \
              -f value="$LATEST_ID"
          fi
