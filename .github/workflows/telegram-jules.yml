name: Telegram to GitHub Issues

"on":
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: read
  issues: write

jobs:
  telegram-to-issue:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Read Telegram and create issue
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          curl -s "https://api.telegram.org/bot${TG_BOT_TOKEN}/getUpdates" > updates.json

          TASK=$(jq -r --arg chat "$TG_CHAT_ID" '
            .result[]
            | select(.message.chat.id|tostring == $chat)
            | select(.message.text | startswith("/task "))
            | .message.text
          ' updates.json | tail -n 1 | sed 's#^/task ##')

          if [ -n "$TASK" ]; then
            gh issue create \
              --repo "${{ github.repository }}" \
              --title "Telegram task" \
              --body "$TASK"

            curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TG_CHAT_ID}" \
              -d text="✅ Задача добавлена в GitHub Issues."
          else
            echo "No /task message found"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
