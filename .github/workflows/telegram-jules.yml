name: Telegram to Jules

"on":
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: read

jobs:
  telegram:
    runs-on: ubuntu-latest

    steps:
      - name: Telegram router
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          curl -s "https://api.telegram.org/bot${TG_BOT_TOKEN}/getUpdates" > updates.json

          MSG=$(jq -r --arg chat "$TG_CHAT_ID" '
            .result[]
            | select(.message.chat.id|tostring == $chat)
            | .message.text
          ' updates.json | tail -n 1)

          if [ -z "$MSG" ] || [ "$MSG" = "null" ]; then
            echo "No message"
            exit 0
          fi

          if echo "$MSG" | grep -q "^/task "; then
            TASK=$(echo "$MSG" | sed 's#^/task ##')

            cat > prompt.txt <<EOF
          You are working in GitHub repository PyCharmerFame/JulesBot.

          Task from Telegram:
          ${TASK}

          Rules:
          - Analyze the repository first.
          - Make the smallest safe changes.
          - Update README if needed.
          - Create a Pull Request.
          - Do not ask questions. Decide and proceed.
          EOF

            PROMPT="$(cat prompt.txt)"

            curl -f "https://jules.googleapis.com/v1alpha/sessions" \
              -X POST \
              -H "Content-Type: application/json" \
              -H "X-Goog-Api-Key: ${JULES_API_KEY}" \
              -d "$(jq -n \
                --arg prompt "$PROMPT" \
                --arg source "sources/github/${{ github.repository }}" \
                '{
                  "prompt": $prompt,
                  "sourceContext": {
                    "source": $source,
                    "githubRepoContext": {
                      "startingBranch": "main"
                    }
                  },
                  "automationMode": "AUTO_CREATE_PR",
                  "title": "Telegram Task"
                }')"

            curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TG_CHAT_ID}" \
              -d text="✅ Задача отправлена в Jules. Жди Pull Request."

            exit 0
          fi

          if echo "$MSG" | grep -q "^/ask "; then
            QUESTION=$(echo "$MSG" | sed 's#^/ask ##')

            ANSWER=$(curl -s \
              "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg q "$QUESTION" '{
                contents: [
                  {
                    parts: [
                      {
                        text: ("Ответь коротко по-русски. Вопрос: " + $q)
                      }
                    ]
                  }
                ]
              }')" | jq -r '.candidates[0].content.parts[0].text // "Не смог получить ответ"')

            curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TG_CHAT_ID}" \
              --data-urlencode text="$ANSWER"

            exit 0
          fi

          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT_ID}" \
            -d text="Команды:%0A/task задача для Jules%0A/ask короткий вопрос Gemini"
